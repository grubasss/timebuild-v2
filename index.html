<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Concept ERP COMPLETE+</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#5fa68a">

</head>
<body>

<header class="top">
    <img src="logo.png" class="logo">
    <h1>House Concept ERP COMPLETE+</h1>
</header>

<main class="wrap">

<section id="stats" class="card"></section>

<section class="card">
<h2>📅 Kalendarz</h2>

<div class="calendar-header">
    <button id="prevMonth">◀</button>
    <span id="monthLabel"></span>
    <button id="nextMonth">▶</button>
</div>

<div id="calendar"></div>

</section>

<section class="card">
<h2>👷 Pracownicy</h2>
<input id="workerName" placeholder="Imię">
<input id="workerRate" placeholder="Stawka zł/h" type="number">
<button onclick="addWorker()">Dodaj pracownika</button>
<div id="workersList"></div>
</section>

<section class="card">
<h2>🏗 Projekty</h2>
<input id="projectName" placeholder="Projekt">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projectsList"></div>
</section>

<section class="card">
<h2>⏱ Godziny</h2>

<select id="hoursWorker"></select>
<select id="hoursProject"></select>

<input id="hoursDate" type="date">
<input id="hoursValue" type="number" placeholder="Godziny">

<button onclick="addHoursSingle()">Jednemu</button>
<button onclick="addHoursAll()">Wszystkim</button>

<div id="hoursList"></div>
</section>

<section class="card">
<h2>💰 Zaliczki</h2>

<select id="advanceWorker"></select>
<input id="advanceDate" type="date">
<input id="advanceValue" type="number" placeholder="Kwota">

<button onclick="addAdvance()">Dodaj zaliczkę</button>

<div id="advancesList"></div>
</section>

<section class="card">
<h2>📊 Wypłaty</h2>
<div id="payouts"></div>
</section>

<section class="card">
<h2>📈 Wykresy</h2>
<canvas id="hoursChart"></canvas>
<canvas id="moneyChart"></canvas>
</section>

<section class="card">
<h2>💾 Backup</h2>
<button onclick="exportData()">Pobierz backup</button>
<input type="file" onchange="importData(event)">
</section>

</main>

<script src="storage.js"></script>
<script src="data-init.js"></script>
<script src="app.js"></script>
<script src="charts.js"></script>

</body>
</html>
