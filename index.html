<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Concept ERP COMPLETE+</title>

  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css?v=2">
  <meta name="theme-color" content="#5fa68a">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="top">
  <img src="logo.png" class="logo" onerror="this.style.display='none'">
  <h1>House Concept ERP COMPLETE+</h1>
</header>

<main class="wrap">

  <!-- STATYSTYKI -->
  <section id="stats" class="card"></section>

  <!-- KALENDARZ -->
  <section class="card">
    <h2>📅 Kalendarz</h2>

    <div class="calendar-header">
      <button id="prevMonth">◀</button>
      <span id="monthLabel"></span>
      <button id="nextMonth">▶</button>
    </div>

    <div id="calendarDays" class="calendar-days"></div>
    <div id="calendar"></div>
  </section>

  <!-- PRACOWNICY -->
  <section class="card">
    <h2>👷 Pracownicy</h2>

    <input id="workerName" placeholder="Imię">
    <input id="workerRate" type="number" placeholder="Stawka zł/h">
    <button onclick="addWorker()">Dodaj pracownika</button>

    <div id="workersList"></div>
  </section>

  <!-- PROJEKTY -->
  <section class="card">
    <h2>📁 Projekty</h2>

    <input id="projectName" placeholder="Projekt">
    <button onclick="addProject()">Dodaj projekt</button>

    <div id="projectsList"></div>
  </section>

  <!-- GODZINY -->
  <section class="card">
    <h2>⏱ Godziny</h2>

    <select id="hoursWorker"></select>
    <select id="hoursProject"></select>
    <input type="date" id="hoursDate">
    <input type="number" step="0.5" id="hoursValue" placeholder="Liczba godzin">
    <button onclick="addHours()">Dodaj godziny</button>

    <div id="entriesList"></div>
  </section>

  <!-- ZALICZKI -->
  <section class="card">
    <h2>💵 Zaliczki</h2>

    <select id="advanceWorker"></select>
    <input type="date" id="advanceDate">
    <input type="number" id="advanceValue" placeholder="Kwota">
    <button onclick="addAdvance()">Dodaj zaliczkę</button>

    <div id="advancesList"></div>
  </section>

  <!-- WYPŁATY -->
  <section class="card">
    <h2>💰 Wypłaty – całość</h2>
    <div id="payouts"></div>
  </section>

  <!-- RAPORT TYGODNIOWY -->
  <section class="card">
    <div id="weeklyReport"></div>
  </section>

  <!-- RAPORT FIRMY -->
  <section class="card">
    <div id="companyReport"></div>
  </section>

  <!-- WYKRESY -->
  <section class="card">
    <h2>📊 Wykresy</h2>
    <canvas id="hoursChart"></canvas>
    <canvas id="moneyChart"></canvas>
  </section>

  <!-- BACKUP -->
  <section class="card">
    <h2>💾 Backup</h2>
    <button onclick="exportData()">Pobierz backup</button>
    <input type="file" onchange="importData(event)">
  </section>

</main>

<!-- ===== SYSTEM FIX ===== -->
<script>
function safeNumber(val){
    return parseFloat(String(val).replace(',','.')) || 0;
}

function formatLocal(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
}

function getTodayLocal(){
    return formatLocal(new Date());
}

function getWeekRangeSafe(dateStr){

    const date = new Date(dateStr + "T12:00:00");
    const day = date.getDay();
    const diff = (day === 0 ? -6 : 1) - day;

    const monday = new Date(date);
    monday.setDate(date.getDate() + diff);

    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);

    return {
        start: formatLocal(monday),
        end: formatLocal(sunday)
    };
}
</script>

<!-- KOLEJNOŚĆ SKRYPTÓW MA ZNACZENIE -->

<script src="storage.js"></script>
<script src="data-init.js"></script>
<script src="app.js?v=4"></script>
<script src="charts.js"></script>
<script src="reports-fixed.js"></script>

</body>
</html>
