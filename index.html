<!DOCTYPE html>
<html lang="pl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Concept ERP</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="top">
<h1>House Concept ERP</h1>
</header>

<div class="wrap">

<!-- DASHBOARD -->

<div class="card">

<h2>Dashboard</h2>

<div class="row">
<b>Pracownicy</b>
<span id="dashWorkers">0</span>
</div>

<div class="row">
<b>Godziny</b>
<span id="dashHours">0</span>
</div>

<div class="row">
<b>Zaliczki</b>
<span id="dashAdvances">0</span>
</div>

<div class="row">
<b>Do wypłaty</b>
<span id="dashToPay">0</span>
</div>

</div>

<!-- KALENDARZ -->

<div class="card">

<h2>Kalendarz</h2>

<div class="calendar-header">
<button id="prevMonth">◀</button>
<div id="monthLabel"></div>
<button id="nextMonth">▶</button>
</div>

<div id="calendar"></div>

</div>

<!-- PRACOWNICY -->

<div class="card">

<h2>Pracownicy</h2>

<input id="workerName" placeholder="Imię">

<input id="workerRate" placeholder="Stawka">

<button onclick="addWorker()">Dodaj pracownika</button>

<div id="workersList"></div>

</div>

<!-- PANEL PRACOWNIKA -->

<div class="card">

<h2>Panel pracownika</h2>

<div id="workerPanel"></div>

</div>

<!-- PROJEKTY -->

<div class="card">

<h2>Projekty</h2>

<input id="projectName" placeholder="Nazwa projektu">

<button onclick="addProject()">Dodaj projekt</button>

<div id="projectsList"></div>

</div>

<!-- GODZINY -->

<div class="card">

<h2>Godziny</h2>

<select id="hoursWorker"></select>

<select id="hoursProject"></select>

<input id="hoursValue" placeholder="Godziny">

<button onclick="addHours()">Dodaj godziny</button>

<select id="entriesFilter" onchange="renderEntries()"></select>

<div id="entriesList"></div>

</div>

<!-- ZALICZKI -->

<div class="card">

<h2>Zaliczki</h2>

<select id="advanceWorker"></select>

<input id="advanceDate" type="date">

<input id="advanceValue" placeholder="Kwota">

<button onclick="addAdvance()">Dodaj zaliczkę</button>

<div id="advancesList"></div>

</div>

<!-- WYPŁATY -->

<div class="card">

<h2>Wypłaty</h2>

<div id="payouts"></div>

</div>

<!-- RANKING -->

<div class="card">

<h2>Ranking pracowników</h2>

<div id="workersRanking"></div>

</div>

<!-- BACKUP -->

<div class="card">

<h2>Backup</h2>

<button onclick="exportData()">Pobierz backup</button>

<br><br>

<label class="btn">

Wgraj backup

<input type="file" onchange="importData(event)" hidden>

</label>

</div>

</div>

<!-- SKRYPTY -->

<script src="storage.js"></script>
<script src="data-init.js"></script>
<script src="app.js"></script>

</body>
</html>
