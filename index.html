<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Concept ERP PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2f8f7a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
--main:#2f8f7a;
--soft:#e8f5f2;
--weekend:#ffecec;
}
body{font-family:Arial;margin:0;background:#f4f6f8}
header{background:var(--main);color:white;padding:15px;text-align:center;font-weight:700}
.container{padding:15px}
.card{background:white;padding:15px;border-radius:12px;margin-bottom:15px;box-shadow:0 2px 6px rgba(0,0,0,0.08)}
button,input,select,textarea{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
button{background:var(--main);color:white;border:none;font-weight:700}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day{background:var(--soft);padding:8px;border-radius:10px;text-align:center;font-weight:600}
.weekend{background:var(--weekend)}
.today{outline:3px solid #22655e}
.dot{width:6px;height:6px;background:var(--main);border-radius:50%;margin:3px auto}
canvas{max-height:200px}
@media(max-width:720px){
.day{font-size:12px;padding:6px}
}
</style>
</head>

<body>

<header>House Concept ERP PRO</header>

<div class="container">

<div class="card">
<h3>Podsumowanie</h3>
Zarobione: <b id="earned">0</b> zł<br>
Zaliczki: <b id="adv">0</b> zł<br>
Do wypłaty: <b id="pay">0</b> zł
</div>

<div class="card">
<h3>Pracownicy</h3>
<input id="workerName" placeholder="Imię">
<input id="workerRate" placeholder="Stawka godzinowa">
<button onclick="addWorker()">Dodaj pracownika</button>
<div id="workersList"></div>
</div>

<div class="card">
<h3>Dodaj godziny</h3>
<select id="hourWorker"></select>
<input type="date" id="hourDate">
<input placeholder="Ilość godzin" id="hourCount">
<button onclick="addHours()">Dodaj godziny</button>
</div>

<div class="card">
<h3>Zaliczka</h3>
<select id="advWorker"></select>
<input type="date" id="advDate">
<input placeholder="Kwota" id="advAmount">
<button onclick="addAdvance()">Dodaj zaliczkę</button>
</div>

<div class="card">
<h3>Kalendarz</h3>
<div class="calendar" id="calendar"></div>
</div>

<div class="card">
<h3>Materiały do kupienia</h3>
<input id="materialInput" placeholder="Materiał">
<button onclick="addMaterial()">Dodaj</button>
<ul id="materials"></ul>
</div>

<div class="card">
<h3>Notatnik</h3>
<textarea id="notes" rows="4"></textarea>
<button onclick="saveNotes()">Zapisz notatki</button>
</div>

<div class="card">
<h3>Wykres godzin (miesiąc)</h3>
<canvas id="hoursChart"></canvas>
</div>

<div class="card">
<h3>Wykres zarobków (miesiąc)</h3>
<canvas id="moneyChart"></canvas>
</div>

<div class="card">
<h3>Backup</h3>
<button onclick="exportData()">Eksportuj</button>
<input type="file" onchange="importData(event)">
<button onclick="exportCSV()">Eksport do Excel (CSV)</button>
</div>

</div>

<script>
let data=JSON.parse(localStorage.getItem("erp"))||{
workers:[],
hours:[],
advances:[],
materials:[],
notes:""
}

function save(){localStorage.setItem("erp",JSON.stringify(data));render()}

function addWorker(){
data.workers.push({id:Date.now(),name:workerName.value,rate:Number(workerRate.value)})
save()
}

function addHours(){
data.hours.push({worker:Number(hourWorker.value),date:hourDate.value,hours:Number(hourCount.value)})
save()
}

function addAdvance(){
data.advances.push({worker:Number(advWorker.value),date:advDate.value,amount:Number(advAmount.value)})
save()
}

function addMaterial(){
data.materials.push(materialInput.value)
materialInput.value=""
save()
}

function saveNotes(){
data.notes=notes.value
save()
}

function exportData(){
const blob=new Blob([JSON.stringify(data)],{type:"application/json"})
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="erp-backup.json"
a.click()
}

function importData(e){
const file=e.target.files[0]
const reader=new FileReader()
reader.onload=function(){
data=JSON.parse(reader.result)
save()
}
reader.readAsText(file)
}

function exportCSV(){
let csv="Pracownik,Godziny,Zarobek\n"
data.workers.forEach(w=>{
let hrs=data.hours.filter(h=>h.worker==w.id).reduce((a,b)=>a+b.hours,0)
csv+=w.name+","+hrs+","+(hrs*w.rate)+"\n"
})
const blob=new Blob([csv],{type:"text/csv"})
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="raport.csv"
a.click()
}

function render(){
workersList.innerHTML=""
hourWorker.innerHTML=""
advWorker.innerHTML=""
data.workers.forEach(w=>{
workersList.innerHTML+=w.name+" ("+w.rate+" zł/h)<br>"
hourWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`
advWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`
})
materials.innerHTML=""
data.materials.forEach(m=>materials.innerHTML+="<li>"+m+"</li>")
notes.value=data.notes
renderSummary()
renderCalendar()
renderCharts()
}

function renderSummary(){
let earned=0
data.workers.forEach(w=>{
let hrs=data.hours.filter(h=>h.worker==w.id)
.reduce((a,b)=>a+b.hours,0)
earned+=hrs*w.rate
})
let adv=data.advances.reduce((a,b)=>a+b.amount,0)
earnedEl=document.getElementById("earned")
advEl=document.getElementById("adv")
payEl=document.getElementById("pay")
earnedEl.textContent=earned
advEl.textContent=adv
payEl.textContent=earned-adv
}

function renderCalendar(){
calendar.innerHTML=""
const now=new Date()
const year=now.getFullYear()
const month=now.getMonth()
const first=new Date(year,month,1)
const last=new Date(year,month+1,0)
const days=["Pn","Wt","Śr","Cz","Pt","Sb","Nd"]
days.forEach(d=>calendar.innerHTML+=`<div><b>${d}</b></div>`)
for(let i=1;i<=last.getDate();i++){
let d=new Date(year,month,i)
let div=document.createElement("div")
div.className="day"
if(d.getDay()==0||d.getDay()==6)div.classList.add("weekend")
if(i==now.getDate())div.classList.add("today")
div.innerHTML=i
let work=data.hours.find(h=>new Date(h.date).getDate()==i)
if(work)div.innerHTML+=`<div class="dot"></div>`
calendar.appendChild(div)
}
}

let hoursChart,moneyChart

function renderCharts(){
let labels=data.workers.map(w=>w.name)
let hoursData=data.workers.map(w=>
data.hours.filter(h=>h.worker==w.id)
.reduce((a,b)=>a+b.hours,0))
let moneyData=data.workers.map((w,i)=>hoursData[i]*w.rate)

if(hoursChart)hoursChart.destroy()
if(moneyChart)moneyChart.destroy()

hoursChart=new Chart(hoursChart=document.getElementById("hoursChart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Godziny",data:hoursData,backgroundColor:"#2f8f7a"}]}
})

moneyChart=new Chart(moneyChart=document.getElementById("moneyChart"),{
type:"bar",
data:{labels:labels,datasets:[{label:"Zarobek",data:moneyData,backgroundColor:"#22655e"}]}
})
}

render()
</script>

</body>
</html>
