<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Concept ERP COMPLETE+</title>

<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#5fa68a">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header class="top">

<img src="logo.png" class="logo" onerror="this.style.display='none'">

<h1>House Concept ERP COMPLETE+</h1>

</header>

<main class="wrap">

<section id="stats" class="card">

<div class="row">
<b>Pracownicy</b>
<span id="dashWorkers">0</span>
</div>

<div class="row">
<b>Godziny</b>
<span id="dashHours">0</span>
</div>

<div class="row">
<b>Zaliczki</b>
<span id="dashAdvances">0</span>
</div>

<div class="row">
<b>Do wypłaty</b>
<span id="dashToPay">0</span>
</div>

</section>

<section class="card">

<h2>📅 Kalendarz</h2>

<div class="calendar-header">

<button id="prevMonth">◀</button>

<span id="monthLabel"></span>

<button id="nextMonth">▶</button>

</div>

<div id="calendarDays" class="calendar-days"></div>

<div id="calendar"></div>

</section>

<section class="card">

<h2>👷 Pracownicy</h2>

<input id="workerName" placeholder="Imię">

<input id="workerRate" type="number" placeholder="Stawka zł/h">

<button onclick="addWorker()">Dodaj pracownika</button>

<div id="workersList"></div>

</section>

<section class="card">

<h2>📁 Projekty</h2>

<input id="projectName" placeholder="Projekt">

<button onclick="addProject()">Dodaj projekt</button>

<div id="projectsList"></div>

</section>

<section class="card">

<h2>⏱ Godziny</h2>

<select id="hoursWorker"></select>

<select id="hoursProject"></select>

<input type="number" step="0.5" id="hoursValue" placeholder="Liczba godzin">

<button onclick="addHours()">Dodaj godziny</button>

<select id="entriesFilter" onchange="renderEntries()"></select>

<div id="entriesList"></div>

</section>

<section class="card">

<h2>💵 Zaliczki</h2>

<select id="advanceWorker"></select>

<input type="date" id="advanceDate">

<input type="number" id="advanceValue" placeholder="Kwota">

<button onclick="addAdvance()">Dodaj zaliczkę</button>

<div id="advancesList"></div>

</section>

<section class="card">

<h2>💰 Wypłaty</h2>

<div id="payouts"></div>

</section>

<section class="card">

<h2>🏆 Ranking pracowników</h2>

<div id="workersRanking"></div>

</section>

<section class="card">

<h2>📊 Wykresy</h2>

<canvas id="hoursChart"></canvas>

<canvas id="moneyChart"></canvas>

</section>

</main>

<script src="storage.js"></script>
<script src="data-init.js"></script>
<script src="app.js"></script>
<script src="charts.js"></script>
<script src="reports-fixed.js"></script>
<script src="backup.js"></script>

<script>

function formatLocal(d){

const y = d.getFullYear();
const m = String(d.getMonth()+1).padStart(2,'0');
const day = String(d.getDate()).padStart(2,'0');

return `${y}-${m}-${day}`;

}

</script>

</body>

</html>
