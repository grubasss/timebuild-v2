<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Concept ERP COMPLETE+</title>

<style>
:root{
--main:#5fa38c;
--bg:#f3f7f6;
--card:#fff;
--soft:#eaf5f1;
--weekend:#fde2e2;
}
body{margin:0;font-family:system-ui;background:var(--bg)}
header{background:#101826;color:#fff;padding:15px;font-weight:700}
.container{max-width:1200px;margin:auto;padding:15px}
.card{background:var(--card);padding:15px;border-radius:18px;margin:15px 0;box-shadow:0 6px 16px rgba(0,0,0,.08)}

button,input,select,textarea{
padding:8px;border-radius:10px;border:1px solid #ccc;margin:4px 0;width:100%;
}
button{background:var(--main);color:#fff;font-weight:700;border:none}

.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-weight:700;margin-bottom:6px}

.day{background:var(--soft);padding:10px;border-radius:14px;text-align:center;cursor:pointer}
.day.weekend{background:var(--weekend)}
.day.today{outline:3px solid #22c55e}
.dot{width:6px;height:6px;background:var(--main);border-radius:50%;margin:4px auto}

.row{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #eee;padding:6px 0;gap:6px}
.small{width:80px}

@media(max-width:720px){
.row{flex-direction:column;align-items:flex-start}
}
</style>
</head>

<body>

<header>🏗 House Concept ERP COMPLETE+</header>

<div class="container">

<div class="card">
<b>Statystyki</b><br>
Zarobione: <span id="earned">0</span> zł<br>
Zaliczki: <span id="advanceTotal">0</span> zł<br>
<b>Do wypłaty: <span id="toPay">0</span> zł</b>
</div>

<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
<button onclick="moveMonth(-1)">◀</button>
<b id="monthLabel"></b>
<button onclick="moveMonth(1)">▶</button>
</div>

<div class="weekdays">
<div>Pn</div><div>Wt</div><div>Śr</div><div>Cz</div><div>Pt</div><div>Sb</div><div>Nd</div>
</div>

<div id="calendar" class="grid"></div>
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<input id="workerName" placeholder="Imię">
<input id="workerRate" type="number" placeholder="Stawka zł/h">
<button onclick="addWorker()">Dodaj pracownika</button>
<div id="workers"></div>
</div>

<div class="card">
<h3>🏗 Projekty</h3>
<input id="projectName" placeholder="Projekt">
<button onclick="addProject()">Dodaj projekt</button>
<div id="projects"></div>
</div>

<div class="card">
<h3>⏱ Dodaj godziny</h3>
<input type="date" id="entryDate">
<select id="entryProject"></select>
<div id="workerCheckboxes"></div>
<input id="entryHours" type="number" placeholder="Godziny">
<button onclick="addEntry()">Dodaj wpis</button>
</div>

<div class="card">
<h3>💰 Zaliczka</h3>
<select id="advanceWorker"></select>
<input type="date" id="advanceDate">
<input id="advanceAmount" type="number" placeholder="Kwota">
<button onclick="addAdvance()">Dodaj zaliczkę</button>
<div id="advances"></div>
</div>

<div class="card">
<h3>📊 Raport tygodniowy</h3>
<div id="weeklyReport"></div>
</div>

<div class="card">
<h3>📊 Raport miesięczny</h3>
<div id="monthlyReport"></div>
</div>

<div class="card">
<h3>🧱 Materiały</h3>
<input id="materialName" placeholder="Materiał">
<button onclick="addMaterial()">Dodaj</button>
<div id="materials"></div>
</div>

<div class="card">
<h3>📝 Notatnik</h3>
<textarea id="notes"></textarea>
<button onclick="saveNotes()">Zapisz</button>
</div>

<div class="card">
<h3>💾 Backup</h3>
<button onclick="backup()">Eksport</button>
<input type="file" onchange="restore(this)">
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("erpComplete")) || {
workers:[],
projects:[],
entries:[],
advances:[],
materials:[],
notes:""
};

function save(){localStorage.setItem("erpComplete",JSON.stringify(db));render();}

function addWorker(){
db.workers.push({id:crypto.randomUUID(),name:workerName.value,rate:+workerRate.value});
workerName.value="";workerRate.value="";
save();
}

function addProject(){
db.projects.push({id:crypto.randomUUID(),name:projectName.value});
projectName.value="";
save();
}

function addEntry(){
let date=entryDate.value;
let project=entryProject.value;
let hours=+entryHours.value;
document.querySelectorAll(".wCheck:checked").forEach(ch=>{
db.entries.push({id:crypto.randomUUID(),date,worker:ch.value,project,hours});
});
entryHours.value="";
save();
}

function addAdvance(){
db.advances.push({id:crypto.randomUUID(),worker:advanceWorker.value,date:advanceDate.value,amount:+advanceAmount.value});
advanceAmount.value="";
save();
}

function addMaterial(){
db.materials.push(materialName.value);
materialName.value="";
save();
}

function saveNotes(){db.notes=notes.value;save();}

function backup(){
const blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});
const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="erp-backup.json";
a.click();
}

function restore(input){
const r=new FileReader();
r.onload=e=>{db=JSON.parse(e.target.result);save();}
r.readAsText(input.files[0]);
}

function weekStart(d){
let date=new Date(d);
let day=date.getDay()||7;
date.setDate(date.getDate()-day+1);
return date.toISOString().slice(0,10);
}

function render(){
workers.innerHTML="";
workerCheckboxes.innerHTML="";
advanceWorker.innerHTML="";
entryProject.innerHTML="";
projects.innerHTML="";
advances.innerHTML="";
materials.innerHTML="";
weeklyReport.innerHTML="";
monthlyReport.innerHTML="";
notes.value=db.notes;

db.workers.forEach(w=>{
workers.innerHTML+=`<div class="row">${w.name} (${w.rate} zł/h)</div>`;
workerCheckboxes.innerHTML+=`<label><input type="checkbox" class="wCheck" value="${w.id}">${w.name}</label><br>`;
advanceWorker.innerHTML+=`<option value="${w.id}">${w.name}</option>`;
});

db.projects.forEach(p=>{
projects.innerHTML+=`<div class="row">${p.name}</div>`;
entryProject.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
});

db.advances.forEach(a=>{
let w=db.workers.find(x=>x.id===a.worker)?.name;
advances.innerHTML+=`<div class="row">${w} – ${a.amount} zł (${a.date})</div>`;
});

db.materials.forEach(m=>materials.innerHTML+=`<div>${m}</div>`);

let earned=0,advTotal=0;
db.entries.forEach(e=>{
let rate=db.workers.find(w=>w.id===e.worker)?.rate||0;
earned+=e.hours*rate;
});
db.advances.forEach(a=>advTotal+=a.amount);

document.getElementById("earned").textContent=earned.toFixed(2);
document.getElementById("advanceTotal").textContent=advTotal.toFixed(2);
document.getElementById("toPay").textContent=(earned-advTotal).toFixed(2);
}

render();
</script>

</body>
</html>
