<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>House Concept ERP COMPLETE+</title>

<style>
body{
font-family:system-ui;
background:#eef2ef;
margin:0;
padding:10px;
}

header{
background:#101826;
color:white;
padding:15px;
border-radius:14px;
display:flex;
align-items:center;
gap:12px;
font-weight:700;
}

.card{
background:white;
border-radius:18px;
padding:14px;
margin:12px 0;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

button,input,select{
width:100%;
padding:10px;
border-radius:12px;
border:1px solid #ccc;
margin:5px 0;
}

button{
background:#63a68f;
color:white;
border:none;
font-weight:700;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
text-align:center;
}

.day{
background:#eaf4ef;
padding:10px;
border-radius:14px;
font-weight:600;
}

.weekend{background:#ffdede}
.today{outline:3px solid #2fbf71}

.dot{
width:7px;
height:7px;
background:#2fbf71;
border-radius:50%;
margin:4px auto 0;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
border-bottom:1px solid #eee;
}
</style>
</head>

<body>

<header>
🏗 House Concept ERP COMPLETE+
</header>

<div class="card" id="stats"></div>

<div class="card">
<h3>📅 Luty 2026</h3>
<div class="calendar" id="calendar"></div>
</div>

<div class="card">
<h3>👷 Pracownicy</h3>
<div id="workers"></div>
</div>

<div class="card">
<h3>💰 Zaliczki</h3>
<div id="advances"></div>
</div>

<div class="card">
<h3>📊 Wypłaty</h3>
<div id="payouts"></div>
</div>

<div class="card">
<h3>🏗 Raport – projekty</h3>
<div id="projects"></div>
</div>

<div class="card">
<h3>📈 Analityka</h3>
<div id="analytics"></div>
</div>

<div class="card">
<h3>💾 Backup</h3>
<button onclick="backup()">Pobierz backup</button>
<input type="file" onchange="restore(this)">
</div>

<script>
const data={
workers:[
{name:"Łukasz",rate:25},
{name:"Komuna",rate:25},
{name:"Daniel",rate:25}
],

workDays:[16,17,18,19,20,23,24,25],

hours:{
Łukasz:30.9,
Komuna:43.5,
Daniel:7.5
},

advances:[
["Łukasz",500],
["Komuna",100],
["Daniel",1350],
["Łukasz",140],
["Łukasz",100],
["Komuna",100]
],

projects:{
"Hala":4150,
"Elewacja Łagów":187.5
}
}

const today=25

function draw(){

let earned=4337.5
let advTotal=2290
let payout=earned-advTotal

stats.innerHTML=`
<b>Zarobione:</b> ${earned} zł<br>
<b>Zaliczki:</b> ${advTotal} zł<br>
<b>Do wypłaty:</b> ${payout} zł
`

calendar.innerHTML=""
for(let i=1;i<=28;i++){
let d=document.createElement("div")
d.className="day"
if([1,7,8,14,15,21,22,28].includes(i)) d.classList.add("weekend")
if(i===today) d.classList.add("today")
d.innerHTML=i
if(data.workDays.includes(i)){
let dot=document.createElement("div")
dot.className="dot"
d.appendChild(dot)
}
calendar.appendChild(d)
}

workers.innerHTML=data.workers.map(w=>`${w.name} – ${w.rate} zł/h`).join("<br>")

advances.innerHTML=data.advances.map(a=>`${a[0]} : ${a[1]} zł`).join("<br>")

payouts.innerHTML=`
Łukasz : 772.5 zł<br>
Komuna : 1087.5 zł<br>
Daniel : 187.5 zł
`

projects.innerHTML=Object.entries(data.projects)
.map(p=>`${p[0]} : ${p[1]} zł`).join("<br>")

analytics.innerHTML=`
Godziny: 173.5<br>
Zarobione: 4337.5 zł
`
}

function backup(){
const blob=new Blob([JSON.stringify(data)],{type:"application/json"})
const a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="erp-backup.json"
a.click()
}

function restore(i){
const f=i.files[0]
const r=new FileReader()
r.onload=()=>{Object.assign(data,JSON.parse(r.result));draw()}
r.readAsText(f)
}

draw()
</script>

</body>
</html>
